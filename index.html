<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Drama Dock — Playable Demo</title>
<style>
  :root{--w:390px;--h:844px;--teal:#38c6c6;--coral:#ff6b6b;--gold:#ffd166;--ink:#263342;--bg:#17202a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0f15;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:white;overflow:hidden}
  #game{position:relative;width:min(100vw,var(--w));height:min(100vh,var(--h));max-height:844px;aspect-ratio:390/844;background:linear-gradient(#6dc8ff 0 45%,#89d887 45%);overflow:hidden;border-radius:24px;box-shadow:0 20px 80px #0008;isolation:isolate}
  .scene{position:absolute;inset:0;display:none;overflow:hidden}.scene.active{display:block}.hud{position:absolute;top:16px;left:16px;right:16px;z-index:20;display:flex;align-items:center;justify-content:space-between}.pill{padding:8px 12px;border-radius:999px;background:#0008;font-weight:800;font-size:13px;backdrop-filter:blur(8px)}
  .tap{animation:pulse 1s infinite}.finger{position:absolute;z-index:50;font-size:46px;filter:drop-shadow(0 8px 8px #0006);animation:finger 1.05s infinite ease-in-out;pointer-events:none}.glow{box-shadow:0 0 0 5px #ffd166aa,0 0 28px 12px #ffd16699!important;animation:pulse 1s infinite}
  @keyframes pulse{50%{transform:scale(1.05);filter:brightness(1.15)}}@keyframes finger{0%,100%{transform:translate(0,0) rotate(-18deg)}50%{transform:translate(-10px,10px) rotate(-18deg)}}@keyframes pop{50%{transform:scale(1.22)}}@keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(5px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
  /* Hook */
  .room{position:absolute;inset:0;background:linear-gradient(#293447 0 42%,#593829 42%);}.sceneArt{position:absolute;left:18px;right:18px;top:132px;bottom:92px;width:calc(100% - 36px);height:calc(100% - 224px);object-fit:cover;border-radius:28px;box-shadow:0 18px 44px #0007}.hookArt{top:132px;bottom:120px;height:calc(100% - 252px)}.choiceArt{top:126px;bottom:196px;height:calc(100% - 322px);object-position:center top}.endArt{top:110px;bottom:230px;height:calc(100% - 340px);object-position:center top}.char{position:absolute;object-fit:contain;filter:drop-shadow(0 18px 16px #0005)}.partner{transition:transform .65s cubic-bezier(.2,1.7,.4,1),opacity .3s}.partner.run{transform:translate(160px,-90px) rotate(25deg);opacity:.2}.bubble{position:absolute;left:38px;top:58px;right:38px;padding:18px;border-radius:22px;background:#fff;color:#243041;font-weight:900;text-align:center;font-size:26px;box-shadow:0 14px 30px #0004;z-index:2}.bubble small{display:block;font-size:14px;color:#6b7280;margin-top:6px}.cry{position:absolute;left:95px;top:425px;font-size:34px;opacity:0;transition:.4s;display:none}.cry.show{opacity:1;transform:translateY(24px)}
  /* Choice */
  .shed{position:absolute;inset:0;background:linear-gradient(#1d2534,#362217 60%,#1b120e);}.sadbox{display:none}.tear{display:none}@keyframes drop{100%{transform:translateY(26px);opacity:0}}.choiceTitle{position:absolute;top:72px;left:24px;right:24px;text-align:center;font-weight:1000;font-size:30px;text-shadow:0 4px #0005;z-index:2}.buttons{position:absolute;left:30px;right:30px;bottom:74px;display:grid;gap:16px;z-index:2}.btn{border:0;border-radius:22px;padding:19px 18px;font-size:22px;font-weight:1000;color:white;box-shadow:0 10px 0 #0004,0 18px 30px #0005}.bad{background:#e74d4d}.good{background:#23c483}
  /* Puzzle */
  .puzzle{background:linear-gradient(#b9efff,#ecfbff 42%,#b7f2d0)}.chain{position:absolute;top:76px;left:28px;right:28px;height:76px;border-radius:24px;background:#fff;color:#253244;display:flex;align-items:center;justify-content:center;gap:10px;font-size:26px;font-weight:1000;box-shadow:0 12px 30px #0002}.goal{position:absolute;top:160px;left:30px;right:30px;text-align:center;color:#253244;font-weight:900;font-size:19px}.board{position:absolute;left:25px;right:25px;top:230px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;border-radius:25px;background:#77d7e6;box-shadow:0 16px 0 #37aebf}.cell{height:64px;border-radius:18px;background:#dff8ff;display:grid;place-items:center;box-shadow:inset 0 -5px #b4e9f4}.item{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:30px;box-shadow:0 7px 0 #0002;cursor:pointer;user-select:none;touch-action:manipulation}.item.selected{outline:5px solid #fff;box-shadow:0 0 0 6px #ffd166,0 10px 20px #0004;transform:scale(1.08)}.t1{background:#ffd166}.t2{background:#86efac}.t3{background:#c084fc}.t4{background:#f472b6}.pop{animation:pop .35s}.spark{position:absolute;font-size:34px;animation:spark .75s forwards;pointer-events:none}@keyframes spark{to{transform:translateY(-45px) scale(1.6);opacity:0}}.progress{position:absolute;left:34px;right:34px;bottom:106px;height:20px;border-radius:999px;background:#fff8;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#23c483,#ffd166);transition:.35s}.helped{position:absolute;left:46px;right:46px;bottom:140px;padding:16px;text-align:center;border-radius:22px;background:#fff;color:#253244;font-weight:1000;font-size:22px;transform:translateY(120px);transition:.5s}.helped.show{transform:none}
  /* Fail/end */
  .fail{background:radial-gradient(circle at 50% 40%,#ffffff,#f7d2d2 45%,#8d1e1e)}.x{position:absolute;inset:0;display:grid;place-items:center;font-size:180px;font-weight:1000;color:#ff2222;text-shadow:0 10px 0 #0003;animation:pop .45s infinite}.failText{position:absolute;left:24px;right:24px;bottom:110px;text-align:center;font-size:30px;font-weight:1000;text-shadow:0 4px #0006}.end{background:linear-gradient(160deg,#1b2a4a,#1fc6c6)}.logo{position:absolute;top:286px;left:28px;right:28px;text-align:center;font-size:54px;line-height:.95;font-weight:1000;text-shadow:0 8px #0004;z-index:2}.tag{position:absolute;top:442px;left:34px;right:34px;text-align:center;font-size:20px;font-weight:800;z-index:2}.play{position:absolute;left:38px;right:38px;bottom:98px;border:0;border-radius:28px;padding:24px;background:#ffd166;color:#293342;font-size:30px;font-weight:1000;box-shadow:0 12px 0 #c58c22;animation:pulse 1s infinite;z-index:2}.confetti{position:absolute;inset:0;pointer-events:none}.confetti i{position:absolute;width:10px;height:18px;background:var(--c);animation:fall 2.4s linear infinite}@keyframes fall{to{transform:translateY(900px) rotate(520deg)}}

  /* Eye-catching playable-ad motion pass */
  #game:before,#game:after{content:"";position:absolute;inset:0;pointer-events:none;z-index:4}#game:before{background:radial-gradient(circle at 18% 14%,#fff9 0 2px,transparent 3px),radial-gradient(circle at 82% 22%,#ffd166aa 0 4px,transparent 5px),radial-gradient(circle at 30% 82%,#ff6b6b77 0 5px,transparent 6px),radial-gradient(circle at 72% 78%,#38c6c677 0 5px,transparent 6px);animation:ambientSparkle 5.5s ease-in-out infinite alternate}#game:after{background:linear-gradient(115deg,transparent 0 36%,#ffffff3f 48%,transparent 60% 100%);transform:translateX(-130%);animation:screenSweep 4.2s ease-in-out infinite}.scene.active{animation:scenePop .34s cubic-bezier(.2,1.25,.25,1)}.bubble{animation:bubblePunch 1.35s ease-in-out infinite}.bubble:after{content:"💔";position:absolute;right:18px;top:-22px;font-size:34px;animation:heartBeat .72s infinite alternate}.choiceTitle{animation:titleGlow 1s ease-in-out infinite alternate}.btn{position:relative;overflow:hidden;transform-origin:center}.btn:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 34%,#fff8 48%,transparent 62%);transform:translateX(-120%);animation:buttonShine 1.9s ease-in-out infinite}.good{animation:ctaBounce .65s ease-in-out infinite alternate}.bad{filter:saturate(.86);animation:badWobble 1.6s ease-in-out infinite}.chain{animation:chainFloat 1.7s ease-in-out infinite}.chain:after{content:"✨";position:absolute;right:18px;animation:twinkle .6s infinite alternate}.board{animation:boardBreath 1.2s ease-in-out infinite alternate}.item{transition:transform .16s ease,filter .16s ease}.item:active{transform:scale(.9) rotate(-8deg)}.item.selected{animation:selectedPulse .48s ease-in-out infinite alternate}.bar{position:relative;overflow:hidden;box-shadow:0 0 18px #ffd166aa}.bar:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,#fff9,transparent);animation:barShine .72s linear infinite}.spark{z-index:60}.shock{position:absolute;width:46px;height:46px;margin:-23px 0 0 -23px;border:5px solid #fff3a7;border-radius:50%;z-index:55;animation:shock .55s ease-out forwards;pointer-events:none}.floatFx{position:absolute;z-index:58;font-size:34px;font-weight:1000;filter:drop-shadow(0 7px 5px #0005);animation:floatFx .8s cubic-bezier(.12,.9,.2,1) forwards;pointer-events:none}.combo{position:absolute;z-index:70;left:50%;top:176px;transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:linear-gradient(135deg,#ff2f6d,#ffd166,#38c6c6);color:white;font-size:24px;font-weight:1000;text-shadow:0 3px #0005;box-shadow:0 12px 28px #0005;animation:combo .9s cubic-bezier(.15,1.4,.24,1) forwards}.panic{animation:panicShake .34s linear 2!important}.logo{animation:logoBlast .8s ease-out both}.play{overflow:hidden}.play:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 32%,#fff9 50%,transparent 66%);transform:translateX(-120%);animation:buttonShine 1.4s infinite}
  @keyframes ambientSparkle{to{transform:translate(12px,-16px) scale(1.06);filter:hue-rotate(20deg)}}@keyframes screenSweep{0%,48%{transform:translateX(-130%)}78%,100%{transform:translateX(130%)}}@keyframes scenePop{from{opacity:.35;transform:scale(1.025)}to{opacity:1;transform:scale(1)}}@keyframes bubblePunch{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.035)}}@keyframes heartBeat{from{transform:scale(.8) rotate(-10deg);opacity:.65}to{transform:scale(1.28) rotate(8deg);opacity:1}}@keyframes titleGlow{to{text-shadow:0 4px #0005,0 0 24px #ffd166}}@keyframes buttonShine{to{transform:translateX(130%)}}@keyframes ctaBounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-5px) scale(1.045)}}@keyframes badWobble{0%,100%{transform:rotate(0)}50%{transform:rotate(-1.5deg)}}@keyframes chainFloat{50%{transform:translateY(-5px)}}@keyframes twinkle{to{transform:scale(1.3) rotate(15deg)}}@keyframes boardBreath{to{filter:brightness(1.08);box-shadow:0 16px 0 #37aebf,0 0 30px #38c6c699}}@keyframes selectedPulse{to{transform:scale(1.12);filter:brightness(1.18)}}@keyframes barShine{to{transform:translateX(100%)}}@keyframes shock{to{opacity:0;transform:scale(5)}}@keyframes floatFx{0%{opacity:0;transform:translate(-50%,0) scale(.55) rotate(0)}12%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),var(--dy)) scale(1.2) rotate(var(--rot))}}@keyframes combo{0%{opacity:0;transform:translateX(-50%) translateY(18px) scale(.5)}20%,75%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-38px) scale(1.08)}}@keyframes panicShake{0%,100%{transform:translate(0)}25%{transform:translate(-6px,3px)}50%{transform:translate(7px,-2px)}75%{transform:translate(-3px,-4px)}}@keyframes logoBlast{0%{opacity:0;transform:scale(.55) rotate(-5deg)}70%{opacity:1;transform:scale(1.12) rotate(2deg)}100%{transform:scale(1)}}

</style>
</head><body><main id="game" aria-label="Drama Dock playable ad demo">
<section id="hook" class="scene active"><div class="room"></div><div class="bubble">He left her alone…<small>Tap to help</small></div><img class="sceneArt hookArt partner" id="partner" src="assets/hook_scene.png" alt="hook story scene" /><div class="cry" id="cry">💧</div><div class="finger" style="left:268px;top:632px">👆</div></section>
<section id="choice" class="scene"><div class="shed"></div><div class="choiceTitle">What should we do?</div><img class="sceneArt choiceArt" src="assets/choice_scene.png" alt="sad girl scene" /><div class="buttons"><button class="btn bad">Ignore her</button><button class="btn good glow" id="helpBtn">Help her</button></div><div class="finger" style="left:250px;top:700px">👆</div></section>
<section id="puzzle" class="scene puzzle"><div class="hud"><span class="pill">Level 1</span><span class="pill" id="timer">0:10</span></div><div class="chain">🕯️ → 🔥 → 🏠 → 💖</div><div class="goal">Merge matching items to warm the room</div><div class="board" id="board"></div><div class="progress"><div class="bar" id="bar"></div></div><div class="helped" id="helped">Almost there… keep merging!</div><div class="finger" id="dragFinger" style="left:118px;top:340px">👆</div></section>
<section id="fail" class="scene fail"><div class="x">✕</div><div class="failText">Too late? Try again!</div></section>
<section id="end" class="scene end"><div class="confetti" id="confetti"></div><img class="sceneArt endArt" src="assets/end_scene.png" alt="happy ending scene" /><div class="logo">DRAMA<br>DOCK</div><div class="tag">A 20-second playable preference test</div><button class="play" onclick="location.reload()">PLAY NOW</button></section>
</main><script>
const $=s=>document.querySelector(s), scenes=['hook','choice','puzzle','fail','end']; let merges=0, started=false;
function sceneFx(id){let g=$('#game'); g.classList.remove('panic'); if(id==='choice') rain(['💔','💧','✨'],10,120,560); if(id==='puzzle') rain(['⚡','✨','🔥'],12,150,620); if(id==='fail'){g.classList.add('panic'); rain(['❌','💥','😱'],18,90,620)} if(id==='end') rain(['🎉','💖','✨','🏆'],34,70,760)}
function rain(chars,count,top,bottom){let g=$('#game'); for(let i=0;i<count;i++){let e=document.createElement('b'); e.className='floatFx'; e.textContent=chars[i%chars.length]; e.style.left=(12+Math.random()*76)+'%'; e.style.top=(top+Math.random()*(bottom-top))+'px'; e.style.setProperty('--dx',(-120+Math.random()*240)+'px'); e.style.setProperty('--dy',(-70-Math.random()*150)+'px'); e.style.setProperty('--rot',(-120+Math.random()*240)+'deg'); g.append(e); setTimeout(()=>e.remove(),900)}}
function comboFx(cell,t){let r=cell.getBoundingClientRect(),g=$('#game').getBoundingClientRect(),x=r.left-g.left+r.width/2,y=r.top-g.top+r.height/2; let ring=document.createElement('i'); ring.className='shock'; ring.style.left=x+'px'; ring.style.top=y+'px'; g.append(ring); setTimeout(()=>ring.remove(),650); rain(['✨','🔥','💖','⚡'],12,Math.max(90,y-80),Math.min(740,y+80)); if(merges+1>=2){let c=document.createElement('div'); c.className='combo'; c.textContent=(merges+1)>=3?'SUPER MERGE!':'COMBO x'+(merges+1); g.append(c); setTimeout(()=>c.remove(),950)}}
function show(id){scenes.forEach(s=>$('#'+s).classList.toggle('active',s===id)); sceneFx(id); if(id==='puzzle'&&!started){started=true; initPuzzle();}}
$('#hook').addEventListener('click',()=>{ rain(['💔','💧','✨'],12,330,660); $('#partner').classList.add('run'); $('#cry').classList.add('show'); setTimeout(()=>show('choice'),900); });
$('#helpBtn').onclick=()=>show('puzzle'); document.querySelector('.bad').onclick=()=>show('puzzle');
const layout=[1,1,0,2,0, 0,1,0,2,2, 3,0,1,0,0, 0,3,0,1,0, 2,0,0,3,3];
function initPuzzle(){const b=$('#board'); b.innerHTML=''; layout.forEach((t,i)=>{let c=document.createElement('div'); c.className='cell'; c.dataset.i=i; if(t)c.append(item(t)); b.append(c)}); makeDrag(); autoHint(); let left=10; let iv=setInterval(()=>{$('#timer').textContent='0:'+String(left).padStart(2,'0'); if(--left<0||merges>=3)clearInterval(iv)},1000)}
function item(t){let e=document.createElement('div'); e.className='item t'+t; e.dataset.t=t; e.textContent=['','🕯️','🔥','🏠','💖'][t]; return e}
let selectedCell=null;
function makeDrag(){
  selectedCell=null;
  document.querySelectorAll('.item').forEach(el=>{
    el.draggable=true;
    el.onclick=e=>{e.stopPropagation(); tapCell(el.parentElement)};
    el.ondragstart=e=>{e.dataTransfer.setData('t',el.dataset.t); e.dataTransfer.setData('from',[...document.querySelectorAll('.cell')].indexOf(el.parentElement));};
  });
  document.querySelectorAll('.cell').forEach(c=>{
    c.onclick=()=>tapCell(c);
    c.ondragover=e=>e.preventDefault();
    c.ondrop=e=>{e.preventDefault(); let from=document.querySelectorAll('.cell')[+e.dataTransfer.getData('from')], src=from&&from.firstChild, dst=c.firstChild; if(src&&dst&&src.dataset.t===dst.dataset.t){merge(c,from,+src.dataset.t)} };
  });
}
function tapCell(cell){
  if(!cell || !cell.firstChild) return;
  if(!selectedCell){selectCell(cell); return;}
  if(selectedCell===cell){selectCell(null); return;}
  const src=selectedCell.firstChild, dst=cell.firstChild;
  if(src&&dst&&src.dataset.t===dst.dataset.t){merge(cell,selectedCell,+src.dataset.t); return;}
  selectCell(cell);
}
function selectCell(cell){document.querySelectorAll('.item.selected').forEach(i=>i.classList.remove('selected')); selectedCell=cell; if(cell&&cell.firstChild)cell.firstChild.classList.add('selected');}
function merge(to,from,t){selectedCell=null; from.innerHTML=''; to.innerHTML=''; let ni=item(Math.min(t+1,4)); ni.classList.add('pop'); to.append(ni); burst(to); comboFx(to,t); merges++; $('#bar').style.width=(merges/3*100)+'%'; if(merges===2)$('#helped').classList.add('show'); if(merges>=3){setTimeout(()=>{ $('#game').style.animation='shake .5s'; show('fail'); setTimeout(()=>show('end'),1250); },650)} makeDrag();}
function burst(cell){let r=cell.getBoundingClientRect(), g=$('#game').getBoundingClientRect(); for(let i=0;i<6;i++){let s=document.createElement('b'); s.className='spark'; s.textContent='✨'; s.style.left=(r.left-g.left+20+Math.random()*25)+'px'; s.style.top=(r.top-g.top+10+Math.random()*30)+'px'; $('#game').append(s); setTimeout(()=>s.remove(),800)}}
function autoHint(){setTimeout(()=>{$('#dragFinger').style.transition='1s'; $('#dragFinger').style.transform='translate(72px,0) rotate(-18deg)'},700);}
for(let i=0;i<42;i++){let p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top=-Math.random()*800+'px';p.style.setProperty('--c',['#ffd166','#ff6b6b','#86efac','#fff','#c084fc'][i%5]);p.style.animationDelay=Math.random()*2+'s';$('#confetti').append(p)}
setTimeout(()=>{ if($('#hook').classList.contains('active')) $('#hook').click(); },2400);
</script></body></html>
