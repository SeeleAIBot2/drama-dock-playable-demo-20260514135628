<section id="puzzle" class="scene puzzle"><div class="hud"><span class="pill">Level 1</span><span class="pill" id="timer">0:10</span></div><div class="chain">🕯️ → 🔥 → 🏠 → 💖</div><div class="goal">Merge matching items to warm the room</div><div class="board" id="board"></div><div class="progress"><div class="bar" id="bar"></div></div><div class="helped" id="helped">Almost there… keep merging!</div><div class="finger" id="dragFinger" style="left:118px;top:340px">👆</div></section>
<section id="fail" class="scene fail"><div class="x">✕</div><div class="failText">Too late? Try again!</div></section>
<section id="end" class="scene end"><div class="confetti" id="confetti"></div><img class="sceneArt endArt" src="assets/end_scene.png" alt="happy ending scene" /><div class="logo">DRAMA<br>DOCK</div><div class="tag">A 20-second playable preference test</div><button class="play" onclick="location.reload()">PLAY NOW</button></section>
<div id="girlBubble" class="girlBubble topToast hidden">Tap fast — I react to every move!</div><div id="companion" class="companion passive flexible"><div id="girlAvatar" class="girlAvatar sad"><img class="avatarImg" src="assets/companion_avatar_ui.png?v=gpt-image-2-202605142303" alt="beautiful game companion avatar" /></div><div id="npcEmote" class="npcEmote">✨</div></div><div id="energyMeter" class="energyMeter"><span>RESCUE POWER</span><i id="energyFill"></i></div><button id="rescueOrb" class="rescueOrb" type="button">💖<small>BLAST</small></button></main><script>
const $=s=>document.querySelector(s), scenes=['hook','choice','puzzle','fail','end']; let merges=0, started=false, energy=0, tapStreak=0;
const girlLines={hook:'Tap the story to start!',choice:'Choose help — make it feel heroic!',puzzle:'Tap matches fast. Fill RESCUE POWER!',fail:'Boom! One last dramatic beat!',end:'You rescued my story 💖'};
let toastTimer=null;function girlMood(mood,line){let av=$('#girlAvatar'),b=$('#girlBubble'),c=$('#companion'),e=$('#npcEmote'); if(!av||!b)return; av.className='girlAvatar '+mood; if(e)e.textContent=mood==='excited'?'💖':mood==='happy'?'✨':'🥺'; c?.classList.remove('cheer','dash'); void c?.offsetWidth; c?.classList.add(mood==='excited'?'cheer':'dash'); b.textContent=line; b.classList.remove('hidden'); b.style.animation='none'; void b.offsetWidth; b.style.animation='bubblePop .22s cubic-bezier(.2,1.4,.25,1)'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>b.classList.add('hidden'),1350);}
function heartBurst(){let g=$('#game'); for(let i=0;i<14;i++){let h=document.createElement('b'); h.className='heartTrail'; h.textContent=['💖','✨','🌸','💫'][i%4]; h.style.left=(282+Math.random()*78)+'px'; h.style.top=(600+Math.random()*100)+'px'; h.style.setProperty('--dx',(-120+Math.random()*130)+'px'); h.style.setProperty('--dy',(-90-Math.random()*150)+'px'); h.style.setProperty('--rot',(-80+Math.random()*160)+'deg'); g.append(h); setTimeout(()=>h.remove(),950)}}
function sceneFx(id){let g=$('#game'); g.classList.remove('panic'); if(id==='choice') rain(['💔','💧','✨'],10,120,560); if(id==='puzzle') rain(['⚡','✨','🔥'],12,150,620); if(id==='fail'){g.classList.add('panic'); rain(['❌','💥','😱'],18,90,620)} if(id==='end') rain(['🎉','💖','✨','🏆'],34,70,760)}
function rain(chars,count,top,bottom){let g=$('#game'); for(let i=0;i<count;i++){let e=document.createElement('b'); e.className='floatFx'; e.textContent=chars[i%chars.length]; e.style.left=(12+Math.random()*76)+'%'; e.style.top=(top+Math.random()*(bottom-top))+'px'; e.style.setProperty('--dx',(-120+Math.random()*240)+'px'); e.style.setProperty('--dy',(-70-Math.random()*150)+'px'); e.style.setProperty('--rot',(-120+Math.random()*240)+'deg'); g.append(e); setTimeout(()=>e.remove(),900)}}
function comboFx(cell,t){let r=cell.getBoundingClientRect(),g=$('#game').getBoundingClientRect(),x=r.left-g.left+r.width/2,y=r.top-g.top+r.height/2; let ring=document.createElement('i'); ring.className='shock'; ring.style.left=x+'px'; ring.style.top=y+'px'; g.append(ring); setTimeout(()=>ring.remove(),650); rain(['✨','🔥','💖','⚡'],12,Math.max(90,y-80),Math.min(740,y+80)); if(merges+1>=2){let c=document.createElement('div'); c.className='combo'; c.textContent=(merges+1)>=3?'SUPER MERGE!':'COMBO x'+(merges+1); g.append(c); setTimeout(()=>c.remove(),950)}}
function show(id){scenes.forEach(s=>$('#'+s).classList.toggle('active',s===id)); girlMood(id==='fail'?'sad':id==='end'?'excited':id==='puzzle'?'happy':'sad',girlLines[id]); sceneFx(id); if(id==='puzzle'&&!started){started=true; initPuzzle(); renderEnergy();}}

function tapFx(cell,label='TAP!'){let g=$('#game'),r=cell.getBoundingClientRect(),gg=g.getBoundingClientRect(),x=r.left-gg.left+r.width/2,y=r.top-gg.top+r.height/2;let rip=document.createElement('i');rip.className='tapRipple';rip.style.left=x+'px';rip.style.top=y+'px';g.append(rip);setTimeout(()=>rip.remove(),520);let t=document.createElement('b');t.className='tapLabel';t.textContent=label;t.style.left=x+'px';t.style.top=(y-10)+'px';g.append(t);setTimeout(()=>t.remove(),650)}
function addEnergy(n){energy=Math.min(100,energy+n);renderEnergy();}
function renderEnergy(){let fill=$('#energyFill'),meter=$('#energyMeter'),orb=$('#rescueOrb'); if(fill)fill.style.width=energy+'%'; let ready=energy>=100; meter?.classList.toggle('ready',ready); orb?.classList.toggle('ready',ready); $('#companion')?.classList.toggle('readyGlow',ready)}
function flash(){let f=document.createElement('i');f.className='screenFlash';$('#game').append(f);setTimeout(()=>f.remove(),480)}
function hintPair(){let cells=[...document.querySelectorAll('.cell')],seen={};cells.forEach(c=>c.classList.remove('targetHint'));for(let c of cells){let it=c.firstChild;if(!it)continue;let t=it.dataset.t;if(seen[t]){seen[t].classList.add('targetHint');c.classList.add('targetHint');setTimeout(()=>{seen[t]?.classList.remove('targetHint');c.classList.remove('targetHint')},900);return [seen[t],c,+t]}seen[t]=c}return null}
function rescueBlast(){if(energy<100)return;energy=0;renderEnergy();flash();girlMood('excited','RESCUE BLAST! Auto-merge one pair!'); $('#companion')?.classList.add('cheer');rain(['💖','⚡','✨','🔥'],24,170,660);let pair=hintPair();setTimeout(()=>{if(pair&&pair[0].firstChild&&pair[1].firstChild)merge(pair[1],pair[0],pair[2]);},260)}
$('#hook').addEventListener('click',()=>{ rain(['💔','💧','✨'],12,330,660); $('#partner').classList.add('run'); $('#cry').classList.add('show'); setTimeout(()=>show('choice'),900); });
$('#helpBtn').onclick=()=>show('puzzle'); document.querySelector('.bad').onclick=()=>show('puzzle');
const layout=[1,1,0,2,0, 0,1,0,2,2, 3,0,1,0,0, 0,3,0,1,0, 2,0,0,3,3];
function initPuzzle(){const b=$('#board'); b.innerHTML=''; layout.forEach((t,i)=>{let c=document.createElement('div'); c.className='cell'; c.dataset.i=i; if(t)c.append(item(t)); b.append(c)}); makeDrag(); autoHint(); let left=10; let iv=setInterval(()=>{$('#timer').textContent='0:'+String(left).padStart(2,'0'); if(--left<0||merges>=3)clearInterval(iv)},1000)}
function item(t){let e=document.createElement('div'); e.className='item t'+t; e.dataset.t=t; e.textContent=['','🕯️','🔥','🏠','💖'][t]; return e}
let selectedCell=null;
function makeDrag(){
  selectedCell=null;
  document.querySelectorAll('.item').forEach(el=>{
    el.draggable=true;
    el.onclick=e=>{e.stopPropagation(); tapCell(el.parentElement)};
    el.ondragstart=e=>{e.dataTransfer.setData('t',el.dataset.t); e.dataTransfer.setData('from',[...document.querySelectorAll('.cell')].indexOf(el.parentElement));};
  });
  document.querySelectorAll('.cell').forEach(c=>{
    c.onclick=()=>tapCell(c);
    c.ondragover=e=>e.preventDefault();
    c.ondrop=e=>{e.preventDefault(); let from=document.querySelectorAll('.cell')[+e.dataTransfer.getData('from')], src=from&&from.firstChild, dst=c.firstChild; if(src&&dst&&src.dataset.t===dst.dataset.t){merge(c,from,+src.dataset.t)} };
  });
}
function tapCell(cell){
  if(!cell || !cell.firstChild) return;
  tapStreak++; tapFx(cell,tapStreak%3===0?'PERFECT!':'TAP!'); addEnergy(8);
  if(!selectedCell){selectCell(cell); return;}
  if(selectedCell===cell){selectCell(null); return;}
  const src=selectedCell.firstChild, dst=cell.firstChild;
  if(src&&dst&&src.dataset.t===dst.dataset.t){merge(cell,selectedCell,+src.dataset.t); return;}
  selectCell(cell);
}
function selectCell(cell){document.querySelectorAll('.item.selected').forEach(i=>i.classList.remove('selected')); selectedCell=cell; if(cell&&cell.firstChild)cell.firstChild.classList.add('selected');}
function merge(to,from,t){girlMood(merges>=1?'excited':'happy',merges>=1?'Yes! Another piece of hope!':'Nice! The room is getting warmer.'); heartBurst(); addEnergy(34); $('.board')?.classList.add('comboShake'); setTimeout(()=>$('.board')?.classList.remove('comboShake'),420); $('#puzzle').classList.add('nudge'); setTimeout(()=>$('#puzzle').classList.remove('nudge'),460); selectedCell=null; from.innerHTML=''; to.innerHTML=''; let ni=item(Math.min(t+1,4)); ni.classList.add('pop'); to.append(ni); burst(to); comboFx(to,t); merges++; $('#bar').style.width=(merges/3*100)+'%'; if(merges===2)$('#helped').classList.add('show'); if(merges>=3){setTimeout(()=>{ $('#game').style.animation='shake .5s'; show('fail'); setTimeout(()=>show('end'),1250); },650)} makeDrag();}
function burst(cell){let r=cell.getBoundingClientRect(), g=$('#game').getBoundingClientRect(); for(let i=0;i<6;i++){let s=document.createElement('b'); s.className='spark'; s.textContent='✨'; s.style.left=(r.left-g.left+20+Math.random()*25)+'px'; s.style.top=(r.top-g.top+10+Math.random()*30)+'px'; $('#game').append(s); setTimeout(()=>s.remove(),800)}}
function autoHint(){setTimeout(()=>{$('#dragFinger').style.transition='1s'; $('#dragFinger').style.transform='translate(72px,0) rotate(-18deg)'},700);}
for(let i=0;i<42;i++){let p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top=-Math.random()*800+'px';p.style.setProperty('--c',['#ffd166','#ff6b6b','#86efac','#fff','#c084fc'][i%5]);p.style.animationDelay=Math.random()*2+'s';$('#confetti').append(p)}

$('#rescueOrb')?.addEventListener('click',rescueBlast);
setTimeout(()=>{ if($('#hook').classList.contains('active')) $('#hook').click(); },2400);
</script></body></html>
