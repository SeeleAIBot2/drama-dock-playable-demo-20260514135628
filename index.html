<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Drama Dock — Playable Demo</title>
<style>
  :root{--w:390px;--h:844px;--teal:#38c6c6;--coral:#ff6b6b;--gold:#ffd166;--ink:#263342;--bg:#17202a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0f15;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:white;overflow:hidden}
  #game{position:relative;width:min(100vw,var(--w));height:min(100vh,var(--h));max-height:844px;aspect-ratio:390/844;background:linear-gradient(#6dc8ff 0 45%,#89d887 45%);overflow:hidden;border-radius:24px;box-shadow:0 20px 80px #0008;isolation:isolate}
  .scene{position:absolute;inset:0;display:none;overflow:hidden}.scene.active{display:block}.hud{position:absolute;top:16px;left:16px;right:16px;z-index:20;display:flex;align-items:center;justify-content:space-between}.pill{padding:8px 12px;border-radius:999px;background:#0008;font-weight:800;font-size:13px;backdrop-filter:blur(8px)}
  .tap{animation:pulse 1s infinite}.finger{position:absolute;z-index:50;font-size:46px;filter:drop-shadow(0 8px 8px #0006);animation:finger 1.05s infinite ease-in-out;pointer-events:none}.glow{box-shadow:0 0 0 5px #ffd166aa,0 0 28px 12px #ffd16699!important;animation:pulse 1s infinite}
  @keyframes pulse{50%{transform:scale(1.05);filter:brightness(1.15)}}@keyframes finger{0%,100%{transform:translate(0,0) rotate(-18deg)}50%{transform:translate(-10px,10px) rotate(-18deg)}}@keyframes pop{50%{transform:scale(1.22)}}@keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(5px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
  /* Hook */
  .room{position:absolute;inset:0;background:linear-gradient(#293447 0 42%,#593829 42%);}.bed{position:absolute;left:36px;top:330px;width:318px;height:280px;border-radius:34px;background:#f4f0e7;box-shadow:0 20px 0 #d8c8b5}.blanket{position:absolute;left:54px;top:440px;width:282px;height:170px;background:linear-gradient(135deg,#4fd1d9,#218aa1);border-radius:26px}.head{position:absolute;width:72px;height:72px;border-radius:50%;background:#ffd1a6;border:5px solid #5b3d35}.hero{left:92px;top:354px}.partner{left:228px;top:354px;transition:transform .65s cubic-bezier(.2,1.7,.4,1),opacity .3s}.partner.run{transform:translate(160px,-90px) rotate(25deg);opacity:.2}.eyes:before,.eyes:after{content:"";position:absolute;top:28px;width:8px;height:8px;border-radius:50%;background:#263342}.eyes:before{left:22px}.eyes:after{right:22px}.mouth{position:absolute;left:29px;top:48px;width:16px;height:8px;border-radius:0 0 16px 16px;border-bottom:4px solid #263342}.bubble{position:absolute;left:38px;top:190px;right:38px;padding:18px;border-radius:22px;background:#fff;color:#243041;font-weight:900;text-align:center;font-size:26px;box-shadow:0 14px 30px #0004}.bubble small{display:block;font-size:14px;color:#6b7280;margin-top:6px}.cry{position:absolute;left:95px;top:425px;font-size:34px;opacity:0;transition:.4s}.cry.show{opacity:1;transform:translateY(24px)}
  /* Choice */
  .shed{position:absolute;inset:0;background:linear-gradient(#1d2534,#362217 60%,#1b120e);}.sadbox{position:absolute;left:55px;top:180px;width:280px;height:330px;border-radius:28px;background:#2f2119;border:10px solid #70492c;box-shadow:inset 0 0 40px #0008}.kid{position:absolute;left:145px;top:270px;width:100px;height:155px}.kid .face{width:88px;height:88px;margin:auto;border-radius:50%;background:#ffd1a6;border:5px solid #51332c}.kid .body{width:90px;height:88px;background:#ff8fab;border-radius:28px;margin:-4px auto 0}.tear{position:absolute;left:60px;top:42px;width:10px;height:18px;background:#5bc0ff;border-radius:50%;animation:drop 1.2s infinite}@keyframes drop{100%{transform:translateY(26px);opacity:0}}.choiceTitle{position:absolute;top:72px;left:24px;right:24px;text-align:center;font-weight:1000;font-size:30px;text-shadow:0 4px #0005}.buttons{position:absolute;left:30px;right:30px;bottom:74px;display:grid;gap:16px}.btn{border:0;border-radius:22px;padding:19px 18px;font-size:22px;font-weight:1000;color:white;box-shadow:0 10px 0 #0004,0 18px 30px #0005}.bad{background:#e74d4d}.good{background:#23c483}
  /* Puzzle */
  .puzzle{background:linear-gradient(#b9efff,#ecfbff 42%,#b7f2d0)}.chain{position:absolute;top:76px;left:28px;right:28px;height:76px;border-radius:24px;background:#fff;color:#253244;display:flex;align-items:center;justify-content:center;gap:10px;font-size:26px;font-weight:1000;box-shadow:0 12px 30px #0002}.goal{position:absolute;top:160px;left:30px;right:30px;text-align:center;color:#253244;font-weight:900;font-size:19px}.board{position:absolute;left:25px;right:25px;top:230px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;border-radius:25px;background:#77d7e6;box-shadow:0 16px 0 #37aebf}.cell{height:64px;border-radius:18px;background:#dff8ff;display:grid;place-items:center;box-shadow:inset 0 -5px #b4e9f4}.item{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:30px;box-shadow:0 7px 0 #0002;cursor:grab;user-select:none;touch-action:none}.t1{background:#ffd166}.t2{background:#86efac}.t3{background:#c084fc}.t4{background:#f472b6}.pop{animation:pop .35s}.spark{position:absolute;font-size:34px;animation:spark .75s forwards;pointer-events:none}@keyframes spark{to{transform:translateY(-45px) scale(1.6);opacity:0}}.progress{position:absolute;left:34px;right:34px;bottom:106px;height:20px;border-radius:999px;background:#fff8;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#23c483,#ffd166);transition:.35s}.helped{position:absolute;left:46px;right:46px;bottom:140px;padding:16px;text-align:center;border-radius:22px;background:#fff;color:#253244;font-weight:1000;font-size:22px;transform:translateY(120px);transition:.5s}.helped.show{transform:none}
  /* Fail/end */
  .fail{background:radial-gradient(circle at 50% 40%,#ffffff,#f7d2d2 45%,#8d1e1e)}.x{position:absolute;inset:0;display:grid;place-items:center;font-size:180px;font-weight:1000;color:#ff2222;text-shadow:0 10px 0 #0003;animation:pop .45s infinite}.failText{position:absolute;left:24px;right:24px;bottom:110px;text-align:center;font-size:30px;font-weight:1000;text-shadow:0 4px #0006}.end{background:linear-gradient(160deg,#1b2a4a,#1fc6c6)}.logo{position:absolute;top:174px;left:28px;right:28px;text-align:center;font-size:54px;line-height:.95;font-weight:1000;text-shadow:0 8px #0004}.tag{position:absolute;top:330px;left:34px;right:34px;text-align:center;font-size:20px;font-weight:800}.play{position:absolute;left:38px;right:38px;bottom:98px;border:0;border-radius:28px;padding:24px;background:#ffd166;color:#293342;font-size:30px;font-weight:1000;box-shadow:0 12px 0 #c58c22;animation:pulse 1s infinite}.confetti{position:absolute;inset:0;pointer-events:none}.confetti i{position:absolute;width:10px;height:18px;background:var(--c);animation:fall 2.4s linear infinite}@keyframes fall{to{transform:translateY(900px) rotate(520deg)}}
</style>
</head><body><main id="game" aria-label="Drama Dock playable ad demo">
<section id="hook" class="scene active"><div class="room"></div><div class="bubble">He left her alone…<small>Tap to help</small></div><div class="bed"></div><div class="blanket"></div><div class="head hero eyes"><div class="mouth"></div></div><div class="head partner eyes" id="partner"><div class="mouth"></div></div><div class="cry" id="cry">💧</div><div class="finger" style="left:268px;top:532px">👆</div></section>
<section id="choice" class="scene"><div class="shed"></div><div class="choiceTitle">What should we do?</div><div class="sadbox"></div><div class="kid"><div class="face eyes"><span class="tear"></span><div class="mouth"></div></div><div class="body"></div></div><div class="buttons"><button class="btn bad">Ignore her</button><button class="btn good glow" id="helpBtn">Help her</button></div><div class="finger" style="left:250px;top:700px">👆</div></section>
<section id="puzzle" class="scene puzzle"><div class="hud"><span class="pill">Level 1</span><span class="pill" id="timer">0:10</span></div><div class="chain">🕯️ → 🔥 → 🏠 → 💖</div><div class="goal">Merge matching items to warm the room</div><div class="board" id="board"></div><div class="progress"><div class="bar" id="bar"></div></div><div class="helped" id="helped">Almost there… keep merging!</div><div class="finger" id="dragFinger" style="left:118px;top:340px">👆</div></section>
<section id="fail" class="scene fail"><div class="x">✕</div><div class="failText">Too late? Try again!</div></section>
<section id="end" class="scene end"><div class="confetti" id="confetti"></div><div class="logo">DRAMA<br>DOCK</div><div class="tag">A 20-second playable preference test</div><button class="play" onclick="location.reload()">PLAY NOW</button></section>
</main><script>
const $=s=>document.querySelector(s), scenes=['hook','choice','puzzle','fail','end']; let merges=0, started=false;
function show(id){scenes.forEach(s=>$('#'+s).classList.toggle('active',s===id)); if(id==='puzzle'&&!started){started=true; initPuzzle();}}
$('#hook').addEventListener('click',()=>{ $('#partner').classList.add('run'); $('#cry').classList.add('show'); setTimeout(()=>show('choice'),900); });
$('#helpBtn').onclick=()=>show('puzzle'); document.querySelector('.bad').onclick=()=>show('puzzle');
const layout=[1,1,0,2,0, 0,1,0,2,2, 3,0,1,0,0, 0,3,0,1,0, 2,0,0,3,3];
function initPuzzle(){const b=$('#board'); b.innerHTML=''; layout.forEach((t,i)=>{let c=document.createElement('div'); c.className='cell'; c.dataset.i=i; if(t)c.append(item(t)); b.append(c)}); makeDrag(); autoHint(); let left=10; let iv=setInterval(()=>{$('#timer').textContent='0:'+String(left).padStart(2,'0'); if(--left<0||merges>=3)clearInterval(iv)},1000)}
function item(t){let e=document.createElement('div'); e.className='item t'+t; e.dataset.t=t; e.textContent=['','🕯️','🔥','🏠','💖'][t]; return e}
function makeDrag(){document.querySelectorAll('.item').forEach(el=>{el.draggable=true; el.ondragstart=e=>{e.dataTransfer.setData('t',el.dataset.t); e.dataTransfer.setData('from',[...document.querySelectorAll('.cell')].indexOf(el.parentElement));};}); document.querySelectorAll('.cell').forEach(c=>{c.ondragover=e=>e.preventDefault(); c.ondrop=e=>{e.preventDefault(); let from=document.querySelectorAll('.cell')[+e.dataTransfer.getData('from')], src=from.firstChild, dst=c.firstChild; if(src&&dst&&src.dataset.t===dst.dataset.t){merge(c,from,+src.dataset.t)} }});}
function merge(to,from,t){from.innerHTML=''; to.innerHTML=''; let ni=item(Math.min(t+1,4)); ni.classList.add('pop'); to.append(ni); burst(to); merges++; $('#bar').style.width=(merges/3*100)+'%'; if(merges===2)$('#helped').classList.add('show'); if(merges>=3){setTimeout(()=>{ $('#game').style.animation='shake .5s'; show('fail'); setTimeout(()=>show('end'),1250); },650)} makeDrag();}
function burst(cell){let r=cell.getBoundingClientRect(), g=$('#game').getBoundingClientRect(); for(let i=0;i<6;i++){let s=document.createElement('b'); s.className='spark'; s.textContent='✨'; s.style.left=(r.left-g.left+20+Math.random()*25)+'px'; s.style.top=(r.top-g.top+10+Math.random()*30)+'px'; $('#game').append(s); setTimeout(()=>s.remove(),800)}}
function autoHint(){setTimeout(()=>{$('#dragFinger').style.transition='1s'; $('#dragFinger').style.transform='translate(72px,0) rotate(-18deg)'},700);}
for(let i=0;i<42;i++){let p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top=-Math.random()*800+'px';p.style.setProperty('--c',['#ffd166','#ff6b6b','#86efac','#fff','#c084fc'][i%5]);p.style.animationDelay=Math.random()*2+'s';$('#confetti').append(p)}
setTimeout(()=>{ if($('#hook').classList.contains('active')) $('#hook').click(); },2400);
</script></body></html>
